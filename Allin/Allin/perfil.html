<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - App de Serviços</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .perfil-header {
            background-color: var(--primary-yellow);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-dark);
        }
        .perfil-header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .perfil-header h2 {
            font-size: 18px;
            font-weight: 700;
        }
        .brand-logo {
            width: 42px;
            height: 42px;
            object-fit: contain;
        }
        .perfil-scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 95px;
        }
        .avatar-section {
            text-align: center;
            margin-bottom: 20px;
        }
        .avatar-placeholder {
            width: 80px;
            height: 80px;
            background: #E5E7E9;
            border-radius: 50%;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .change-photo-txt {
            font-size: 12px;
            color: var(--dark-yellow);
            font-weight: 600;
            cursor: pointer;
        }
        .back-btn {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-dark);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-decoration: none;
        }
        .submit-btn {
            background-color: var(--primary-yellow);
            color: var(--text-dark);
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(241,196,15,0.2);
        }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <div class="perfil-header">
            <div class="perfil-header-left">
                <a href="home.html" class="back-btn">←</a>
                <h2>Editar Perfil</h2>
            </div>
            <img src="img/1000067940-removebg-preview.png" class="brand-logo" alt="Logo">
        </div>

        <div class="perfil-scroll-area">
            <div class="avatar-section">
                <div class="avatar-placeholder">👤</div>
                <span class="change-photo-txt">Alterar foto</span>
            </div>

            <form id="perfil-form" onsubmit="alert('Alterações salvas com sucesso!'); return false;">
                <div class="input-group">
                    <label>Nome</label>
                    <input type="text" value="João">
                </div>

                <div class="input-group">
                    <label>Sobrenome</label>
                    <input type="text" value="Silva">
                </div>

                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" value="joao.silva@email.com">
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" value="********">
                </div>

                <div class="input-group">
                    <label>Número de Telefone</label>
                    <input type="tel" value="(11) 99999-9999">
                </div>

                <div class="input-group">
                    <label>Biografia</label>
                    <textarea rows="3">Usuario do app em busca dos melhores profissionais de São Paulo.</textarea>
                </div>

                <div class="input-group">
                    <label>Condição Financeira</label>
                    <select>
                        <option value="baixa">Até 1 salário mínimo</option>
                        <option value="media-baixa" selected>De 1 a 3 salários mínimos</option>
                        <option value="media">De 3 a 5 salários mínimos</option>
                        <option value="media-alta">De 5 a 10 salários mínimos</option>
                        <option value="alta">Acima de 10 salários mínimos</option>
                        
                    </select>
                </div>

                <div class="input-group">
                    <label>Localização</label>
                    <select>
                        <option value="SP" selected>São Paulo (SP)</option>
                        <option value="RJ">Rio de Janeiro (RJ)</option>
                        <option value="MG">Minas Gerais (MG)</option>
                        <option value="PR">Paraná (PR)</option>
                        <option value="RS">Rio Grande do Sul (RS)</option>
                        <option value="outro">Outro Estado</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn">Salvar Alterações</button>
            </form>
        </div>

        <nav class="nav-bar">
            <a href="perfil.html" class="nav-item" style="opacity: 0.5;"><div class="nav-icon">👤</div>Perfil</a>
            <a href="chat.html" class="nav-item"><div class="nav-icon">💬</div>Mensagens</a>
            <a href="pagamento.html" class="nav-item"><div class="nav-icon">R$</div>Pagamento</a>
            <a href="#" class="nav-item"><div class="nav-icon">•••</div>Configurações</a>
        </nav>

    </div>

</body>
</html>
