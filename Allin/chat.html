<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <div class="phone-container">
        <div class="chat-header">
            <a href="listagem.html" class="back-btn" style="text-decoration: none;">←</a>
            <div class="chat-user-info">
                <div class="chat-avatar">👨</div>
                <strong id="chat-header-name">Prestador</strong>
            </div>
            <div class="chat-actions">
                <span>📞</span>
                <span>⋮</span>
            </div>
        </div>
        
        <div class="chat-messages">
            <div class="message incoming">Olá! Como posso te ajudar com o seu problema hoje?</div>
            <div class="message outgoing">Preciso de um orçamento para o conserto.</div>
            <div class="message incoming">Perfeito, pode me enviar uma foto do ocorrido?</div>
        </div>
        
        <div class="chat-input-area">
            <div class="chat-input-box"></div>
            <span class="chat-icon">🎙️</span>
            <span class="chat-icon">📷</span>
        </div>
    </div>
    <script>
        // Recupera o nome selecionado na listagem, se houver
        const nomeSelecionado = localStorage.getItem('selectedProvider') || "Nanca Glorei";
        document.getElementById('chat-header-name').innerText = nomeSelecionado;
    </script>
</body>
</html>
