<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - App de Serviços</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        /* --- ESTILOS DO CABEÇALHO E ESTRUTURA --- */
        .login-header {
            position: relative;
            background: var(--primary-yellow);
            padding: 40px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .login-header-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .brand-logo {
            width: 45px;
            height: 45px;
            object-fit: contain;
        }
        .login-scroll-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .login-content {
            padding: 0; 
            display: flex;
            flex-direction: column;
            height: calc(100% - 140px);
        }
        .login-scroll-container::-webkit-scrollbar {
            width: 5px;
        }
        .login-scroll-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* --- ANIMAÇÃO DO CIRCUITO DE LOADING (GIRAR) --- */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <div id="loading-screen" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; color: white; border-radius: 30px;">
            <div style="width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary-yellow); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;"></div>
            <span style="font-weight: bold; font-size: 14px; letter-spacing: 0.5px;">Criando sua conta...</span>
        </div>

        <div class="login-header">
            <div class="login-header-text">
                <h2>Crie seu Perfil</h2>
                <p>Escolha o plano ideal para você</p>
            </div>
            <img src="./img/1000067940-removebg-preview.png" class="brand-logo" alt="Logo">
        </div>

        <div class="login-content">
            <div class="login-scroll-container">
                
                <div class="plan-row">
                    <div class="plan-card" onmouseover="atualizarTexto('base')"><strong>Base</strong></div>
                    <div class="plan-card" onmouseover="atualizarTexto('emp_base')"><strong>Emp. Base</strong></div>
                    <div class="plan-card" onmouseover="atualizarTexto('eximus')"><strong>Eximus</strong></div>
                </div>

                <div id="desc-box" class="desc-box">
                    Passe o mouse nos planos para ver os detalhes.
                </div>

                <form onsubmit="realizarCadastro(event)">
                    <div class="input-group">
                        <label>Nome Completo</label>
                        <input type="text" placeholder="Ex: João Silva" required>
                    </div>

                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" placeholder="seu@email.com" required>
                    </div>

                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Condição Financeira</label>
                        <select required>
                            <option value="" disabled selected>Selecione sua faixa de renda</option>
                            <option value="baixa">Até 1 salário mínimo</option>
                            <option value="media-baixa">De 1 a 3 salários mínimos</option>
                            <option value="media">De 3 a 5 salários mínimos</option>
                            <option value="media-alta">De 5 a 10 salários mínimos</option>
                            <option value="alta">Acima de 10 salários mínimos</option>
                         
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Localização (Estado)</label>
                        <select required>
                            <option value="" disabled selected>Selecione sua região</option>
                            <option value="SP">São Paulo (SP)</option>
                            <option value="RJ">Rio de Janeiro (RJ)</option>
                            <option value="MG">Minas Gerais (MG)</option>
                            <option value="PR">Paraná (PR)</option>
                            <option value="RS">Rio Grande do Sul (RS)</option>
                            <option value="outro">Outro Estado</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-entrar" style="width: 100%; padding: 14px; background: var(--primary-yellow); border: none; border-radius: 25px; font-weight: bold; cursor: pointer; margin-top: 15px; margin-bottom: 25px; color: var(--text-dark);">Criar Conta</button>
                </form>

            </div>
        </div>
    </div>

    <script>
        const textos = {
            'base': '<b>Base:</b> Cliente ou trabalhador solo, o básico com todas as opções necessárias disponíveis.',
            'emp_base': '<b>Empresarial Base:</b> Para empresas menores, auxilia na administração, colaboração e vínculos de ganhos.',
            'eximus': '<b>Empresarial Eximus:</b> Para empresas maiores, informações detalhadas, vínculos de empresa para empresa e distribuição automatizada.'
        };
        
        function atualizarTexto(plano) {
            document.getElementById('desc-box').innerHTML = textos[plano];
        }

        // Esta função ativa o loading e controla a transição de páginas
        function realizarCadastro(event) {
            event.preventDefault(); // Impede que o formulário recarregue o HTML bruto
            
            const loading = document.getElementById('loading-screen');
            loading.style.display = 'flex'; // Torna o loading visível na tela

            // Executa o redirecionamento após 2.2 segundos (2200ms)
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 2200);
        }
    </script>
</body>
</html>
